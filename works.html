    <meta property="og:image" content="assets/hero-workspace.png">
    <title>shXX1F | 个人作品</title>

  <body>
    <header class="site-header" aria-label="站点页眉">
      <a class="brand" href="index.html" aria-label="shXX1F 首页">
        <span class="brand-mark">S</span>
        <span>shXX1F</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a class="is-active" href="works.html">个人作品</a>
        <a href="journey.html">人生历程</a>
        <a href="about.html">关于联系</a>
      </nav>
    </header>

    <main>
      <section class="page-hero" aria-labelledby="works-title">
        <div>
          <p class="eyebrow">Works</p>
          <h1 id="works-title">个人作品</h1>
          <p>
            这里适合放最能代表自己的项目：完整页面、小工具、课程作品、实验项目，或者任何你想继续打磨的东西。
          </p>
        </div>
        <a class="button primary" href="https://github.com/shXX1F?tab=repositories" target="_blank" rel="noreferrer">
          <i data-lucide="github" aria-hidden="true"></i>
          GitHub 仓库
        </a>
      </section>

      <section class="section work-focus" aria-labelledby="focus-title">
        <div class="section-heading">
          <p class="eyebrow">Focus</p>
          <h2 id="focus-title">作品可以按方向来整理。</h2>
        </div>
        <div class="focus-grid">
          <article class="focus-card">
            <i data-lucide="layout-dashboard" aria-hidden="true"></i>
            <h3>网页与界面</h3>
            <p>个人主页、展示页、交互界面，以及偏前端视觉表达的练习。</p>
          </article>
          <article class="focus-card">
            <i data-lucide="wrench" aria-hidden="true"></i>
            <h3>工具与脚本</h3>
            <p>把重复的事情自动化，或者把一个具体问题做成可以复用的小工具。</p>
          </article>
          <article class="focus-card">
            <i data-lucide="brain-circuit" aria-hidden="true"></i>
            <h3>学习实验</h3>
            <p>记录学习过程中的探索、验证和阶段性成果。</p>
          </article>
        </div>
      </section>

      <section class="section projects-section" aria-labelledby="repo-title">
        <div class="section-heading split">
          <div>
            <p class="eyebrow">Repositories</p>
            <h2 id="repo-title">GitHub 项目</h2>
          </div>
          <a class="text-link" href="https://github.com/shXX1F?tab=repositories" target="_blank" rel="noreferrer">
            全部仓库
            <i data-lucide="arrow-up-right" aria-hidden="true"></i>
          </a>
        </div>
        <div class="project-grid" data-project-grid data-project-limit="9" aria-live="polite">
          <article class="project-card skeleton" aria-hidden="true"></article>
          <article class="project-card skeleton" aria-hidden="true"></article>
          <article class="project-card skeleton" aria-hidden="true"></article>
          <article class="project-card skeleton" aria-hidden="true"></article>
          <article class="project-card skeleton" aria-hidden="true"></article>
          <article class="project-card skeleton" aria-hidden="true"></article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>&copy; <span data-year></span> shXX1F</span>
      <span><a href="index.html">返回首页</a></span>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
